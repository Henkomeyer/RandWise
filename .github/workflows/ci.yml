name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore RandWise.sln

      - name: Format
        run: dotnet format RandWise.sln --verify-no-changes --no-restore

      - name: Build
        run: dotnet build RandWise.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test RandWise.sln --configuration Release --no-build

  frontend:
    name: Frontend
    runs-on: windows-latest

    defaults:
      run:
        working-directory: frontend/randwise-web

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: frontend/randwise-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
